name: Create Release for Dependabot @actual-app/api Updates

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]' && startsWith(github.event.pull_request.title, 'Bump @actual-app/api')
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Get app version
        id: version
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.app_version }}
          name: v${{ steps.version.outputs.app_version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker-image:
    needs: [create-release]
    uses: ./.github/workflows/docker-publish.yml
    with:
      tag_name: v${{ needs.create-release.outputs.app_version }}
      source_ref: ${{ github.event.pull_request.merge_commit_sha }}
    secrets: inherit
